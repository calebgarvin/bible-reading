<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>M'Cheyne Bible Reading Plan</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,600;1,400&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'EB Garamond', 'Georgia', serif;
    background-color: #f5f0e8;
    color: #3b2f1e;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 1.5rem 1rem;
  }

  .container {
    max-width: 420px;
    width: 100%;
    text-align: center;
  }

  h1 {
    font-size: 1.35rem;
    font-weight: 600;
    letter-spacing: 0.04em;
    margin-bottom: 0.2rem;
    color: #2a1f0e;
  }

  .subtitle {
    font-size: 0.95rem;
    font-style: italic;
    color: #6b5a42;
    margin-bottom: 1.5rem;
  }

  .nav {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 1.2rem;
    margin-bottom: 0.7rem;
  }

  .nav button {
    background: none;
    border: 1px solid #c4b79a;
    color: #6b5a42;
    font-size: 0;
    width: 2.4rem;
    height: 2.4rem;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background-color 0.15s, color 0.15s;
    -webkit-tap-highlight-color: transparent;
    padding: 0;
    line-height: 1;
  }

  .nav button svg {
    width: 0.9rem;
    height: 0.9rem;
    stroke: currentColor;
    stroke-width: 2.5;
    fill: none;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .nav button:hover {
    background-color: #e6ddd0;
    color: #3b2f1e;
  }

  .date-display {
    font-size: 1.35rem;
    font-weight: 600;
    min-width: 10rem;
    color: #2a1f0e;
  }

  .today-label {
    font-size: 0.95rem;
    font-style: italic;
    color: #8a7a62;
    margin-top: 0.1rem;
    height: 1.2em;
  }

  .card {
    background-color: #faf6ef;
    border: 1px solid #d9cebc;
    border-radius: 6px;
    padding: 1.3rem 1.5rem;
    margin-bottom: 1rem;
  }

  .card-label {
    font-size: 0.8rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: #8a7a62;
    margin-bottom: 0.6rem;
  }

  .reading {
    font-size: 1.25rem;
    line-height: 1.8;
    color: #2a1f0e;
  }

  .divider {
    width: 2.5rem;
    height: 1px;
    background-color: #c4b79a;
    margin: 0 auto;
    margin-top: 1.5rem;
    margin-bottom: 0.6rem;
  }

  .footer {
    font-size: 0.75rem;
    color: #a89878;
    font-style: italic;
  }

  .return-today {
    font-family: 'EB Garamond', serif;
    font-size: 0.85rem;
    color: #8a7a62;
    background: none;
    border: none;
    cursor: pointer;
    text-decoration: underline;
    margin-top: 0.15rem;
    height: 1.6em;
    visibility: hidden;
    -webkit-tap-highlight-color: transparent;
  }

  .return-today:hover {
    color: #3b2f1e;
  }
</style>
</head>
<body>

<div class="container">
  <h1>M&#8217;Cheyne Reading Plan</h1>
  <p class="subtitle">Daily Bible Reading</p>

  <div class="nav">
    <button id="prev" aria-label="Previous day"><svg viewBox="0 0 12 12"><polyline points="8,2 4,6 8,10"/></svg></button>
    <div>
      <div class="date-display" id="dateDisplay"></div>
      <div class="today-label" id="todayLabel"></div>
    </div>
    <button id="next" aria-label="Next day"><svg viewBox="0 0 12 12"><polyline points="4,2 8,6 4,10"/></svg></button>
  </div>

  <button class="return-today" id="returnToday">Return to today</button>

  <div class="card">
    <div class="card-label">Family</div>
    <div class="reading" id="familyReadings"></div>
  </div>

  <div class="card">
    <div class="card-label">Secret</div>
    <div class="reading" id="secretReadings"></div>
  </div>

  <div class="divider"></div>
  <p class="footer">Robert Murray M&#8217;Cheyne</p>
</div>

function findIndex(m,d){
  for(let i=0;i<R.length;i++){if(R[i][0]===m&&R[i][1]===d)return i;}

}

let todayIdx=findIndex(todayMonth,todayDay);

function render(){
  const r=R[currentIdx];

    label.textContent="\u00a0";

  document.getElementById("familyReadings").innerHTML=r[2]+"<br>"+r[3];

}

});
