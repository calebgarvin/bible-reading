  body {

    text-align: center;
  }

  h1 {

    font-weight: 600;
    letter-spacing: 0.04em;
    margin-bottom: 0.2rem;
    color: #2a1f0e;
  }

  .subtitle {

  }

  .plan-link {

  .plan-link a {

    text-decoration: none;
  }

  .plan-link a:hover {
    color: #6b5a42;

  }

  .nav {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 1.2rem;
    margin-bottom: 0.7rem;
  }

  .nav button {
    background: none;
    border: 1px solid #c4b79a;
    color: #6b5a42;
    font-size: 0;
    width: 2.4rem;
    height: 2.4rem;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;

    -webkit-tap-highlight-color: transparent;
    padding: 0;
    line-height: 1;
  }

  .nav button svg {
    width: 0.9rem;
    height: 0.9rem;
    stroke: currentColor;
    stroke-width: 2.5;
    fill: none;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .nav button:hover {
    background-color: #e6ddd0;
    color: #3b2f1e;
  }

  .date-display {
    font-size: 1.35rem;
    font-weight: 600;
    min-width: 10rem;
    color: #2a1f0e;
  }

  .today-label {
    font-size: 0.95rem;
    font-style: italic;
    color: #8a7a62;
    margin-top: 0.1rem;
    height: 1.2em;
  }

  .card {

    border-radius: 6px;
    padding: 1.3rem 1.5rem;
    margin-bottom: 1rem;

    color: #8a7a62;

  body.dark .footer a { color: #7a6e58; }

  body.dark .plan-link a { color: #7a6e58; }

  body.dark .dark-toggle {

  body.dark thead th { background-color: #2a2520; color: #9a8a6e; border-color: #3a3428; }

  body.dark .back-link { color: #9a8a6e; }

  .dark-toggle {

    right: 0.8rem;

    border: 1px solid #c4b79a;

    height: 1rem;

    fill: none;
    stroke-linecap: round;

</style>

    btn.style.visibility="visible";
  }

  document.getElementById("todayReading").textContent=r[2];
}

document.getElementById("prev").addEventListener("click",function(){
  currentIdx=(currentIdx-1+R.length)%R.length;
  render();
});
document.getElementById("next").addEventListener("click",function(){
  currentIdx=(currentIdx+1)%R.length;
  render();
});
document.getElementById("returnToday").addEventListener("click",function(){
  currentIdx=todayIdx;
  render();
});

render();

(function(){
  var d=localStorage.getItem("darkMode");
  if(d==="true") document.body.classList.add("dark");
  document.getElementById("darkToggle").addEventListener("click",function(){
    document.body.classList.toggle("dark");
    localStorage.setItem("darkMode",document.body.classList.contains("dark"));
  });
})();

</script>
